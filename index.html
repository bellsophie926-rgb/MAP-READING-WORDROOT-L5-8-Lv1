    &lt;style&gt;
        :root {
            --primary: #2563EB;
            --primary-light: #DBEAFE;
            --secondary: #64748B;
            --accent: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --background: #F8FAFC;
            --foreground: #0F172A;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Layout */
        header {
            background: #FFFFFF;
            border-bottom: 1px solid #E2E8F0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar / Reading Area */
        #passage-area {
            width: 45%;
            padding: 2rem;
            overflow-y: auto;
            border-right: 1px solid #E2E8F0;
            background: #FFFFFF;
            -webkit-overflow-scrolling: touch;
        }

        /* Question Area */
        #question-area {
            width: 55%;
            padding: 2rem;
            overflow-y: auto;
            background: var(--background);
            position: relative;
        }

        /* Typography */
        .passage-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
        .passage-text { font-size: 1.125rem; line-height: 1.7; color: #334155; text-align: justify; }
        .question-number { font-size: 0.875rem; font-weight: 600; color: var(--secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .question-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.4; }

        /* Components */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:not(.active) {
            background: white;
            color: var(--secondary);
            border-color: #E2E8F0;
        }

        .option-card {
            background: white;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            background: #F1F5F9;
        }

        .option-card.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option-card.correct {
            border-color: var(--accent);
            background: #ECFDF5;
        }

        .option-card.wrong {
            border-color: var(--danger);
            background: #FEF2F2;
        }

        .option-label {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .selected .option-label { background: var(--primary); color: white; }
        .correct .option-label { background: var(--accent); color: white; }
        .wrong .option-label { background: var(--danger); color: white; }

        /* Feedback Area */
        #feedback-panel {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .feedback-correct { background: #ECFDF5; border: 1px solid #10B981; }
        .feedback-wrong { background: #FEF2F2; border: 1px solid #EF4444; }

        .explanation-header { font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .root-logic { background: rgba(255,255,255,0.5); padding: 0.75rem; border-radius: 8px; margin-top: 1rem; border-left: 4px solid var(--primary); }
        .trap-analysis { background: #FFFBEB; padding: 0.75rem; border-radius: 8px; margin-top: 1rem; border-left: 4px solid var(--warning); }

        /* Navigation */
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-bottom: 3rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1D4ED8; transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-bar {
            height: 4px;
            background: #E2E8F0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        /* Level Badge */
        .level-badge {
            background: #F1F5F9;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary);
            border: 1px solid #E2E8F0;
        }

        /* Sidebar Toggle for Mobile */
        .mobile-toggle { display: none; }

        @media (max-width: 1024px) {
            main { flex-direction: column; }
            #passage-area, #question-area { width: 100%; height: 50%; }
            #passage-area { border-right: none; border-bottom: 1px solid #E2E8F0; }
        }
    &lt;/style&gt;

        // Initialize App
        function initApp() {
            renderQuestion();
            updateProgress();
        }

        function switchSet(setName) {
            appData.currentSet = setName;
            appData.currentIndex = 0;
            appData.score = 0;
            appData.isAnswered = false;
            appData.selectedOption = null;
            
            document.querySelectorAll('.tab-btn').forEach(btn =&gt; btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('rit-label').innerText = appData.sets[setName].rit;
            
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            const set = appData.sets[appData.currentSet];
            let qGlobalIndex = appData.currentIndex;
            let targetPassage, targetQ;
            
            let count = 0;
            for (const p of set.passages) {
                if (qGlobalIndex &lt; count + p.questions.length) {
                    targetPassage = p;
                    targetQ = p.questions[qGlobalIndex - count];
                    break;
                }
                count += p.questions.length;
            }

            if (!targetQ) {
                showFinalResults();
                return;
            }

            // Reset UI
            appData.isAnswered = false;
            appData.selectedOption = null;
            document.getElementById('feedback-panel').style.display = 'none';
            document.getElementById('check-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('check-btn').disabled = true;

            // Render Passage
            document.getElementById('passage-content').innerHTML = `
                &lt;div class=&quot;passage-title&quot;&gt;${targetPassage.title}&lt;/div&gt;
                &lt;div class=&quot;passage-text&quot;&gt;${targetPassage.text}&lt;/div&gt;
            `;

            // Render Question
            const totalQs = set.passages.reduce((acc, p) =&gt; acc + p.questions.length, 0);
            document.getElementById('q-header').innerText = `Question ${qGlobalIndex + 1} of ${totalQs}`;
            document.getElementById('q-text').innerText = targetQ.q;

            // Render Options
            const optionsHtml = targetQ.options.map((opt, i) =&gt; `
                &lt;div class=&quot;option-card&quot; onclick=&quot;selectOption(${i})&quot; id=&quot;opt-${i}&quot;&gt;
                    &lt;div class=&quot;option-label&quot;&gt;${String.fromCharCode(65 + i)}&lt;/div&gt;
                    &lt;div class=&quot;option-text&quot;&gt;${opt}&lt;/div&gt;
                &lt;/div&gt;
            `).join('');
            document.getElementById('options-list').innerHTML = optionsHtml;
        }

        function selectOption(index) {
            if (appData.isAnswered) return;
            appData.selectedOption = index;
            document.querySelectorAll('.option-card').forEach(card =&gt; card.classList.remove('selected'));
            document.getElementById(`opt-${index}`).classList.add('selected');
            document.getElementById('check-btn').disabled = false;
        }

        function checkAnswer() {
            const set = appData.sets[appData.currentSet];
            let count = 0;
            let targetQ;
            for (const p of set.passages) {
                if (appData.currentIndex &lt; count + p.questions.length) {
                    targetQ = p.questions[appData.currentIndex - count];
                    break;
                }
                count += p.questions.length;
            }

            appData.isAnswered = true;
            const isCorrect = appData.selectedOption === targetQ.correct;
            
            // UI Updates
            const selectedEl = document.getElementById(`opt-${appData.selectedOption}`);
            const correctEl = document.getElementById(`opt-${targetQ.correct}`);
            
            if (isCorrect) {
                appData.score++;
                selectedEl.classList.add('correct');
                document.getElementById('feedback-msg').innerHTML = `&lt;span style=&quot;color:var(--accent)&quot;&gt;✔ Correct!&lt;/span&gt;`;
                document.getElementById('feedback-panel').className = 'feedback-correct';
            } else {
                selectedEl.classList.add('wrong');
                correctEl.classList.add('correct');
                document.getElementById('feedback-msg').innerHTML = `&lt;span style=&quot;color:var(--danger)&quot;&gt;✘ Not quite.&lt;/span&gt;`;
                document.getElementById('feedback-panel').className = 'feedback-wrong';
            }

            document.getElementById('explanation-text').innerText = targetQ.explanation;
            document.getElementById('logic-content').innerText = targetQ.logic;
            document.getElementById('trap-content').innerText = targetQ.trap;
            
            document.getElementById('feedback-panel').style.display = 'block';
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';

            anime({
                targets: '#feedback-panel',
                translateY: [20, 0],
                opacity: [0, 1],
                duration: 600,
                easing: 'easeOutQuart'
            });
        }

        function nextQuestion() {
            appData.currentIndex++;
            renderQuestion();
            updateProgress();
        }

        function updateProgress() {
            const set = appData.sets[appData.currentSet];
            const totalQs = set.passages.reduce((acc, p) =&gt; acc + p.questions.length, 0);
            const progress = (appData.currentIndex / totalQs) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function showFinalResults() {
            const set = appData.sets[appData.currentSet];
            const totalQs = set.passages.reduce((acc, p) =&gt; acc + p.questions.length, 0);
            const percentage = Math.round((appData.score / totalQs) * 100);
            
            document.getElementById('question-container').innerHTML = `
                &lt;div style=&quot;text-align:center; padding: 3rem 1rem;&quot;&gt;
                    &lt;div style=&quot;font-size: 4rem; margin-bottom: 1rem;&quot;&gt;🎉&lt;/div&gt;
                    &lt;h2 class=&quot;text-3xl font-bold mb-2&quot;&gt;Practice Complete!&lt;/h2&gt;
                    &lt;p class=&quot;text-gray-600 mb-6&quot;&gt;You've finished ${appData.currentSet === 'A' ? 'Set A' : 'Set B'}.&lt;/p&gt;
                    &lt;div style=&quot;font-size: 3rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;&quot;&gt;${percentage}%&lt;/div&gt;
                    &lt;p class=&quot;font-bold text-lg mb-8&quot;&gt;${appData.score} out of ${totalQs} correct&lt;/p&gt;
                    &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;resetApp()&quot;&gt;Try Another Set&lt;/button&gt;
                &lt;/div&gt;
            `;
        }

        function resetApp() {
            appData.currentIndex = 0;
            appData.score = 0;
            location.reload();
        }

        // Start
        window.onload = initApp;
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
